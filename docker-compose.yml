x-tools-build: &tools-build
  context: .
  target: tools

x-runner-build: &runner-build
  context: .
  target: runner

x-migrate-build: &migrate-build
  context: .
  target: migrate

services:
  caddy:
    image: caddy:2.8-alpine
    container_name: fluxpoint-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  db:
    image: postgres:16-alpine
    container_name: fluxpoint-db
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - fluxpoint_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  migrate:
    image: fluxpoint-migrate
    build: *migrate-build
    container_name: fluxpoint-migrate
    restart: "no"
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
    command: ["./node_modules/.bin/prisma", "migrate", "deploy"]

  bootstrap:
    image: fluxpoint-tools
    build: *tools-build
    profiles: ["bootstrap"]
    restart: "no"
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: ["npm", "run", "db:bootstrap"]

  app:
    image: fluxpoint-app
    build: *runner-build
    container_name: fluxpoint-app
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    volumes:
      - ./public/uploads:/app/public/uploads
      - ./public/labels:/app/public/labels
      - ./public/reports:/app/public/reports
      - ./backups:/app/backups
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      storage-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/api/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: fluxpoint-prometheus
    profiles: ["observability"]
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-30d}"
      - "--web.enable-lifecycle"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - fluxpoint_prometheus_data:/prometheus
    depends_on:
      app:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.4.0
    container_name: fluxpoint-grafana
    profiles: ["observability"]
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-fluxpoint}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change_me}
      GF_SECURITY_ALLOW_EMBEDDING: ${GRAFANA_ALLOW_EMBEDDING:-true}
      GF_AUTH_ANONYMOUS_ENABLED: ${GRAFANA_ANONYMOUS_ENABLED:-false}
      GF_SERVER_ROOT_URL: ${GRAFANA_PUBLIC_URL:-}
    volumes:
      - fluxpoint_grafana_data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started

  storage-init:
    image: alpine:3.20
    restart: "no"
    user: "0:0"
    volumes:
      - ./public/uploads:/app/public/uploads
      - ./public/labels:/app/public/labels
      - ./public/reports:/app/public/reports
      - ./backups:/app/backups
    command: ["sh", "-c", "mkdir -p /app/public/uploads /app/public/labels /app/public/reports /app/backups && chown -R 1001:1001 /app/public/uploads /app/public/labels /app/public/reports /app/backups"]

  reminders:
    image: fluxpoint-tools
    # This is the single tools-image build owner for the workers profile.
    # The remaining workers reuse the image instead of exporting it again.
    container_name: fluxpoint-reminders
    profiles: ["workers"]
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: ["npm", "run", "worker:reminders"]

  metrics:
    image: fluxpoint-tools
    build: *tools-build
    container_name: fluxpoint-metrics
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      ENABLE_METRICS_WORKER: "true"
    volumes:
      - ./public/uploads:/app/public/uploads
      - ./public/labels:/app/public/labels
      - ./public/reports:/app/public/reports
      - ./backups:/app/backups
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      storage-init:
        condition: service_completed_successfully
    command: ["npm", "run", "worker:metrics"]

  backups:
    image: fluxpoint-tools
    container_name: fluxpoint-backups
    profiles: ["workers"]
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - ./backups:/app/backups
      - ./public/uploads:/app/public/uploads:ro
      - ./public/labels:/app/public/labels:ro
      - ./public/reports:/app/public/reports:ro
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: ["npm", "run", "worker:backups"]

  ai-worker:
    image: fluxpoint-tools
    container_name: fluxpoint-ai-worker
    profiles: ["workers"]
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: ["npm", "run", "worker:ai"]

  image-moderation:
    image: fluxpoint-tools
    container_name: fluxpoint-image-moderation
    profiles: ["workers"]
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - ./public/uploads:/app/public/uploads
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: ["npm", "run", "worker:image-moderation"]

  docs:
    image: mcr.microsoft.com/playwright:v1.51.1-noble
    profiles: ["docs"]
    restart: "no"
    working_dir: /work
    env_file:
      - path: .env.production
      - path: .env.docs-screenshots
        required: false
    environment:
      FLUXPOINT_DOCS_BASE_URL: ${FLUXPOINT_DOCS_BASE_URL:-http://app:3000}
      NPM_CONFIG_AUDIT: "false"
      NPM_CONFIG_FUND: "false"
      NPM_CONFIG_INCLUDE: "dev"
      NPM_CONFIG_OMIT: ""
      NPM_CONFIG_UPDATE_NOTIFIER: "false"
      NPM_CONFIG_PROGRESS: "false"
    volumes:
      - .:/work
      - fluxpoint_docs_node_modules:/work/node_modules
    depends_on:
      app:
        condition: service_healthy
    command:
      - sh
      - -lc
      - |
        if [ ! -x node_modules/.bin/tsx ] || [ ! -d node_modules/playwright ]; then
          npm install --no-save --include=dev --package-lock=false --no-audit --no-fund --progress=false tsx@4.19.2 typescript@5.7.2 playwright@1.51.1
        fi
        if [ ! -x node_modules/.bin/tsx ]; then
          echo "Docs screenshot runner could not find node_modules/.bin/tsx after npm install." >&2
          exit 1
        fi
        node_modules/.bin/tsx scripts/generate-manual-screenshots.ts

volumes:
  fluxpoint_pgdata:
  fluxpoint_prometheus_data:
  fluxpoint_grafana_data:
  fluxpoint_docs_node_modules:
  caddy_data:
  caddy_config:
